            type=semver,pattern={{version}},suffix=-java8
            type=semver,pattern={{major}}.{{minor}},suffix=-java8
            type=sha,suffix=-java8,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.java8
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=java8
          cache-to: type=gha,mode=max,scope=java8

